services:
  cast-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${AM_PORT:-9000}:9000"
    env_file:
      - .env
    environment:
      - AM_DEFAULT_CHAIN=${AM_DEFAULT_CHAIN:-ethereum}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
